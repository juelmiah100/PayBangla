        .custom-scrollbar::-webkit-scrollbar { width: 4px; }

        .grid-btn {
            transition: transform 0.1s ease-out, background-color 0.1s ease-out;
            cursor: pointer;
            border: 1px solid rgba(229, 231, 235, 0.8);
            will-change: transform;
        }
        .dark .grid-btn { border-color: rgba(39, 39, 42, 0.8); }
        .grid-btn:active { transform: scale(0.96); }
        .midas-card {
            transition: all 0.15s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .midas-card.selected {
            border-color: #006A4E;
            background: rgba(0, 106, 78, 0.08);
        }
        .dark .midas-card.selected {
            border-color: #00E676;
            background: rgba(0, 230, 118, 0.12);
        }
        .chat-bubble-me { background: #006A4E; color: white; border-radius: 16px 16px 2px 16px; }
        .chat-bubble-other { background: #E5E7EB; color: #111827; border-radius: 16px 16px 16px 2px; }
        .dark .chat-bubble-other { background: #27272A; color: #F9FAFB; }
        @keyframes ticker {
            0% { transform: translate3d(100%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
        .ticker-wrap { overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 25s linear infinite; }
    </style>
</head>

            <span id="p2p-nav-unread-dot" class="hidden absolute -top-1 right-2 w-2.5 h-2.5 bg-red-500 rounded-full animate-ping"></span>

        <button onclick="switchScreen('services')" class="flex flex-col items-center gap-0.5 hover:text-emerald-500" id="nav-services">

</div>

    const translations = {

            phone: "মোবাইল নম্বর", logout: "লগআউট করুন", no_account: "অ্যাকাউন্ট নেই?", have_account: "ইতিমধ্যে অ্যাকাউন্ট আছে?"
        },
        en: {
            nav_home: "Home", nav_transactions: "History", nav_services: "Services", nav_settings: "Settings",
            welcome_back: "Welcome Back", login_subtitle: "Access PayBangla digital wallet securely.",
            balance_title: "Main Wallet Balance", send_money: "Send Money", add_money: "Deposit",
            withdraw: "Cash Out", receive: "Receive", mobile_recharge: "Recharge",
            gaming_store: "Game Top-Up", data_pack: "Data Package", recent_transactions: "Recent History",
            register: "Register", login: "Login", email: "Email Address", password: "Password", name: "Full Name",
            phone: "Mobile Number", logout: "Log Out", no_account: "Don't have an account?", have_account: "Already have an account?"
        }
    };

    const STORAGE_KEY = 'paybangla_user_db_v15';

    // --- Global Application State ---
    let state = {
        currentLanguage: 'bn',
        currentUser: null,
        userProfile: null,
        balanceVisibility: true,
        selectedOperator: 'gp',
        selectedGame: 'pubg',
        selectedGamePkg: null,
        usdtRates: { buyRate: 122.50, sellRate: 120.00 },
        adminDepositWallet: "01700000000 (bKash/Nagad Personal)",
        adminUSDTWallet: "T9xY1zA82kL90pM29qR1S83tU0vW",
        bannerNotice: "🔥 PayBangla ওয়ালেটে স্বাগতম! ইনস্ট্যান্ট P2P ট্রেডিং, ইউএসডিটি বাই-সেল ও গেম টপ-আপ উপভোগ করুন।",
        featureFlags: {

        },

            { id: "GW2", name: "Nagad Personal", number: "01800000000", type: "Nagad", instructions: "নগদ সেন্ড মানি করুন।" }
        ],
        gamePackages: {
            pubg: [{ id: "p1", name: "60 UC", price: 88 }, { id: "p2", name: "325 UC", price: 420 }],
            freefire: [{ id: "ff1", name: "115 Diamonds", price: 80 }]
        },
        dataPackages: {
            gp: [{ id: "gp1", name: "1.5 GB (3 দিন)", price: 48 }],
            bl: [{ id: "bl1", name: "2 GB (7 দিন)", price: 57 }],
            robi: [{ id: "rb1", name: "3 GB (3 দিন)", price: 68 }],
            teletalk: [{ id: "tt1", name: "1 GB (30 দিন)", price: 30 }]
        },
        customOffers: [
            { id: "off1", title: "১০০% ক্যাশব্যাক অফার", desc: "প্রথম ১০০০ টাকা ডিপোজিটে ৫০ টাকা ইনস্ট্যান্ট ক্যাশব্যাক!", active: true }
        ],
        p2pAds: [],
        p2pTrades: [],
        allUsers: [],
        pendingRequests: [],
        transactions: []
    };

    const operators = [
        { id: 'gp', name: 'Grameenphone', color: '#1E90FF', prefix: '017' },
        { id: 'bl', name: 'Banglalink', color: '#F58025', prefix: '019' },
        { id: 'robi', name: 'Robi', color: '#E31E24', prefix: '018' },
        { id: 'teletalk', name: 'Teletalk', color: '#00A651', prefix: '015' }
    ];

    const games = [
        { id: 'pubg', name: 'PUBG Mobile', icon: 'fa-gun', color: '#F0A500' },
        { id: 'freefire', name: 'Free Fire', icon: 'fa-gem', color: '#FF5722' }
    ];

    // --- Master Data Sync Functions ---
    function loadMasterState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                const parsed = JSON.parse(raw);
                if (parsed.allUsers && parsed.allUsers.length > 0) state.allUsers = parsed.allUsers;
                if (parsed.userProfile) state.userProfile = parsed.userProfile;
                if (parsed.pendingRequests) state.pendingRequests = parsed.pendingRequests;
                if (parsed.usdtRates) state.usdtRates = parsed.usdtRates;
                if (parsed.paymentGateways) state.paymentGateways = parsed.paymentGateways;
                if (parsed.gamePackages) state.gamePackages = parsed.gamePackages;
                if (parsed.dataPackages) state.dataPackages = parsed.dataPackages;
                if (parsed.p2pAds) state.p2pAds = parsed.p2pAds;
                if (parsed.p2pTrades) state.p2pTrades = parsed.p2pTrades;
                if (parsed.transactions) state.transactions = parsed.transactions;
                if (parsed.currentLanguage) state.currentLanguage = parsed.currentLanguage;
                if (parsed.bannerNotice) state.bannerNotice = parsed.bannerNotice;
                if (parsed.featureFlags) state.featureFlags = parsed.featureFlags;
                if (parsed.customOffers) state.customOffers = parsed.customOffers;
            } catch (e) { console.error("Load error", e); }
        }

        if (state.userProfile) {
            const updatedUser = state.allUsers.find(u => 
                u.id === state.userProfile.id || 
                (u.email && state.userProfile.email && u.email.toLowerCase() === state.userProfile.email.toLowerCase())
            );
            if (updatedUser) {
                state.userProfile = { ...updatedUser };
            }
        }

        const bText = document.getElementById('banner-text');
        if (bText && state.bannerNotice) bText.innerText = state.bannerNotice;

        updateP2PUnreadDot();
    }

    function saveMasterState() {
        if (state.userProfile && state.userProfile.id) {
            const idx = state.allUsers.findIndex(u => 
                u.id === state.userProfile.id || 
                (u.email && state.userProfile.email && u.email.toLowerCase() === state.userProfile.email.toLowerCase())
            );
            if (idx !== -1) {
                state.allUsers[idx] = { ...state.userProfile };
            } else {
                state.allUsers.push({ ...state.userProfile });
            }
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            allUsers: state.allUsers,
            userProfile: state.userProfile,
            pendingRequests: state.pendingRequests,
            usdtRates: state.usdtRates,
            paymentGateways: state.paymentGateways,
            gamePackages: state.gamePackages,
            dataPackages: state.dataPackages,
            p2pAds: state.p2pAds,
            p2pTrades: state.p2pTrades,
            transactions: state.transactions,
            currentLanguage: state.currentLanguage,
            bannerNotice: state.bannerNotice,
            featureFlags: state.featureFlags,
            customOffers: state.customOffers
        }));

        if (isFirebaseAvailable && db && state.userProfile && state.userProfile.id) {
            db.collection('users').doc(state.userProfile.id).set(state.userProfile, { merge: true }).catch(err => console.warn(err));
        }

        updateP2PUnreadDot();
    }

    // ADMIN FEATURE TOGGLE CONTROL WITH "COMING SOON / কামিং সুন" MODAL
    function checkFeatureFlag(flagKey, serviceName) {
        if (state.featureFlags && state.featureFlags[flagKey] === false) {
            showModal("কামিং সুন (Coming Soon)", `
                <div class="text-center py-6 space-y-3">
                    <div class="w-16 h-16 bg-amber-100 dark:bg-amber-950/50 text-amber-600 rounded-full flex items-center justify-center text-3xl mx-auto shadow-inner">
                        <i class="fa-solid fa-clock-rotate-left animate-spin"></i>
                    </div>
                    <h3 class="text-base font-black text-gray-900 dark:text-zinc-100">কামিং সুন! (Coming Soon)</h3>
                    <p class="text-xs text-gray-500 dark:text-zinc-400 font-medium px-4">
                        <span class="text-emerald-600 dark:text-emerald-400 font-bold">${serviceName}</span> সার্ভিসটি বর্তমানে আপগ্রেড করা হচ্ছে। খুব শীঘ্রই এটি চালু হবে!
                    </p>
                    <button onclick="closeModal()" class="w-full bg-emerald-700 text-white font-extrabold py-3 rounded-xl text-xs uppercase shadow">
                        ঠিক আছে
                    </button>
                </div>
            `);
            return false;
        }
        return true;
    }

    function updateP2PUnreadDot() {
        if (!state.userProfile) return;
        const unreadTradeExists = state.p2pTrades.some(t => 
            (t.buyerId === state.userProfile.id || t.sellerId === state.userProfile.id) &&
            t.lastSenderId && t.lastSenderId !== state.userProfile.id && t.isSeen === false
        );

        const dot = document.getElementById('p2p-nav-unread-dot');
        if (dot) {
            if (unreadTradeExists) dot.classList.remove('hidden');
            else dot.classList.add('hidden');
        }
    }

    // INSTANT APP INITIALIZATION
    function initApp() {
        loadMasterState();

        if (state.userProfile) {
            state.currentUser = { uid: state.userProfile.id, email: state.userProfile.email };
            switchScreen('dashboard', false);
        } else {
            renderLoginScreen();
        }

        if (isFirebaseAvailable && auth) {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    state.currentUser = user;
                    const doc = await db.collection('users').doc(user.uid).get();
                    if (doc.exists) {
                        state.userProfile = { id: user.uid, ...doc.data() };
                    }
                    saveMasterState();
                }
            });
        }
        applyLanguage();
    }

    window.addEventListener('storage', (e) => {
        if (e.key === STORAGE_KEY) {
            loadMasterState();
            if (state.currentUser) {
                const activeScreen = document.getElementById('main-content').getAttribute('data-active-screen') || 'dashboard';
                switchScreen(activeScreen, false);
            }
        }
    });

    // MOBILE HARDWARE BACK BUTTON HANDLER
    window.onpopstate = function(event) {
        const modal = document.getElementById('modal-container');
        if (modal && !modal.classList.contains('hidden')) {
            closeModal();
            return;
        }

        const activeScreen = document.getElementById('main-content').getAttribute('data-active-screen');
        if (activeScreen && activeScreen !== 'dashboard') {
            switchScreen('dashboard', false);
        }
    };

    function applyLanguage() {
        document.getElementById('lang-btn-text').innerText = state.currentLanguage === 'en' ? 'বাংলা' : 'English';
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (translations[state.currentLanguage][key]) {
                el.innerText = translations[state.currentLanguage][key];
            }
        });
    }

    function toggleLanguage() {
        state.currentLanguage = state.currentLanguage === 'en' ? 'bn' : 'en';
        saveMasterState();
        applyLanguage();
        if (state.currentUser) {
            const currentScreen = document.getElementById('main-content').getAttribute('data-active-screen') || 'dashboard';
            switchScreen(currentScreen, false);
        } else {
            renderLoginScreen();
        }
    }

    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
    }

    // High Performance UI Screen Switcher with History Support
    function switchScreen(screenName, pushState = true) {
        if (!state.currentUser) { renderLoginScreen(); return; }
        const mainContent = document.getElementById('main-content');
        const bottomNav = document.getElementById('bottom-nav');
        
        mainContent.setAttribute('data-active-screen', screenName);
        bottomNav.classList.remove('hidden');

        if (pushState) {
            window.history.pushState({ screen: screenName }, "", "#" + screenName);
        }

        document.querySelectorAll('#bottom-nav button').forEach(b => {
            b.classList.remove('text-emerald-600', 'dark:text-emerald-400');
            b.classList.add('text-gray-600', 'dark:text-zinc-400');
        });

        const navMap = { 'dashboard': 'nav-home', 'transactions': 'nav-tx', 'services': 'nav-services', 'settings': 'nav-settings' };
        if (navMap[screenName]) {
            const btn = document.getElementById(navMap[screenName]);
            if (btn) { btn.classList.add('text-emerald-600', 'dark:text-emerald-400'); btn.classList.remove('text-gray-600', 'dark:text-zinc-400'); }
        }

        switch (screenName) {
            case 'dashboard': renderDashboard(); break;
            case 'transactions': renderTransactions(); break;
            case 'services': renderServices(); break;
            case 'settings': renderSettings(); break;
            default: renderDashboard();
        }
    }

    // --- Authentication Engine ---
    function renderLoginScreen() {
        document.getElementById('bottom-nav').classList.add('hidden');
        const mainContent = document.getElementById('main-content');
        const t = translations[state.currentLanguage];
        mainContent.innerHTML = `
            <div class="flex flex-col items-center justify-center py-8">
                <div class="w-20 h-20 bg-emerald-700 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mb-3">
                    <i class="fa-solid fa-wallet"></i>

    function toggleAuthForm() {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const toggleText = document.getElementById('toggle-auth-text');
        const t = translations[state.currentLanguage];
        if (registerForm.classList.contains('hidden')) {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            toggleText.innerHTML = `${t.have_account} <a href="#" onclick="toggleAuthForm()" class="text-emerald-600 font-bold underline">${t.login}</a>`;
        } else {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            toggleText.innerHTML = `${t.no_account} <a href="#" onclick="toggleAuthForm()" class="text-emerald-600 font-bold underline">${t.register}</a>`;
        }
    }

    // SUPER FAST INSTANT LOGIN FUNCTION
    async function loginWithEmail() {
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const password = document.getElementById('login-password').value;

        if (!email || !password) return alert("ইমেইল ও পাসওয়ার্ড প্রবেশ করান।");

        // 1. Check Local DB First for Instant Login (0ms Delay)
        let match = state.allUsers.find(u => u.email.toLowerCase() === email);

        if (match) {
            if (match.isBlocked) return alert("আপনার অ্যাকাউন্টটি স্থগিত করা হয়েছে।");
            state.userProfile = match;
            state.currentUser = { uid: match.id, email: match.email };
            saveMasterState();
            switchScreen('dashboard');
            return;
        }

        // 2. Fallback to Firebase Auth if not in Local Memory
        if (isFirebaseAvailable && auth) {
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                if (cred.user) {
                    state.currentUser = cred.user;
                    state.userProfile = {
                        id: cred.user.uid,
                        name: cred.user.displayName || email.split('@')[0],
                        email: email,
                        balance: 0,
                        usdtBalance: 0,
                        role: "User",
                        isBlocked: false
                    };
                    saveMasterState();
                    switchScreen('dashboard');
                    return;
                }
            } catch (err) {
                alert("ভুল ইমেইল বা পাসওয়ার্ড অথবা ইন্টারনেট কানেকশন চেক করুন!");
                return;
            }
        }

        alert("অ্যাকাউন্ট পাওয়া যায়নি! অনুগ্রহ করে নতুন অ্যাকাউন্ট সাইন-আপ করুন।");
    }

    async function registerWithEmail() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim().toLowerCase();
        const phone = document.getElementById('reg-phone').value.trim();
        const password = document.getElementById('reg-password').value;

        if (!name || !email || !phone || password.length < 6) return alert("সকল তথ্য সঠিকভাবে পূরণ করুন।");

        const existing = state.allUsers.find(u => u.email.toLowerCase() === email);
        if (existing) return alert("এই ইমেইল দিয়ে আগেই অ্যাকাউন্ট রেজিস্টার করা হয়েছে!");

        const userId = "USER_" + Date.now().toString().slice(-6);
        const newUser = {
            id: userId,
            name: name,
            email: email,
            phone: phone,
            balance: 0.00,
            usdtBalance: 0.00,
            role: "User",
            isBlocked: false,
            registeredAt: new Date().toISOString().replace('T', ' ').slice(0, 16)
        };

        if (isFirebaseAvailable && auth) {
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                newUser.id = cred.user.uid;
            } catch (e) { console.warn(e.message); }
        }

        state.allUsers.push(newUser);
        state.userProfile = newUser;
        state.currentUser = { uid: newUser.id, email: newUser.email };

        saveMasterState();
        alert("অ্যাাকাউন্ট তৈরি সফল হয়েছে!");
        switchScreen('dashboard');
    }

    async function handleLogout() {
        if (isFirebaseAvailable && auth) await auth.signOut();
        state.currentUser = null;
        renderLoginScreen();
    }

    function renderDataPacksForOperator(opId) {
        state.selectedOperator = opId;
        document.querySelectorAll('[id^="dop-"]').forEach(el => el.classList.remove('selected'));
        const target = document.getElementById('dop-' + opId);
        if (target) target.classList.add('selected');

        const packs = state.dataPackages[opId] || [];
        document.getElementById('data-pack-list').innerHTML = packs.map(p => `
            <div class="flex justify-between items-center p-3.5 bg-gray-50 dark:bg-zinc-900 rounded-2xl border border-gray-200 dark:border-zinc-800">
                <div>
                    <h4 class="text-xs font-bold text-gray-900 dark:text-zinc-100">${p.name}</h4>
                    <span class="text-[10px] text-emerald-600 font-extrabold">মূল্য: ৳ ${p.price} BDT</span>
                </div>
                <button onclick="promptDataPackMobileNumber('${p.name}', ${p.price})" class="bg-emerald-700 hover:bg-emerald-600 text-white font-black text-xs px-3.5 py-2 rounded-xl shadow">
                    প্যাক কিনুন
                </button>
            </div>
        `).join('');
    }

    function promptDataPackMobileNumber(packName, price) {
        showModal("ডাটা প্যাক ক্রয় করুন", `
            <div class="space-y-4">
                <div class="p-3 bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-200 rounded-xl text-xs font-bold">
                    প্যাকেজ: <span class="text-emerald-700 dark:text-emerald-400 font-black">${packName}</span><br>
                    মূল্য: <span class="text-emerald-700 dark:text-emerald-400 font-black">৳ ${price} BDT</span>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">প্রাপকের মোবাইল নম্বর</label>
                    <input type="tel" id="datapack-target-phone" value="${state.userProfile.phone || ''}" placeholder="01700000000" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-xs font-bold">
                </div>
                <button onclick="processDataPackOrder('${packName}', ${price})" class="w-full bg-emerald-700 text-white font-extrabold py-3.5 rounded-xl text-xs uppercase shadow">
                    অর্ডার কনফার্ম করুন
                </button>
            </div>
        `);
    }

    function processDataPackOrder(packName, price) {
        const phone = document.getElementById('datapack-target-phone').value.trim();
        if (!phone || phone.length < 11) return alert("সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন!");

        if (price > state.userProfile.balance) return alert("আপনার ওয়ালেটে পর্যাপ্ত টাকা নেই!");

        state.pendingRequests.unshift({
            id: "REQ_" + Date.now().toString().slice(-4),
            userId: state.userProfile.id,
            userName: state.userProfile.name,
            type: `Data Pack (${packName})`,
            amountBDT: price,
            trxId: phone,
            status: "Pending",
            timestamp: new Date().toISOString().replace('T', ' ').slice(0, 16)
        });

        saveMasterState();
        closeModal();
        alert(`ডাটা প্যাক ক্রয় রিকোয়েস্ট জমা দেওয়া হয়েছে (${phone})!`);
        renderDashboard();
    }

    function setUSDTTradeType(type) {
        document.getElementById('usdt-trade-type').value = type;
        const buyBtn = document.getElementById('usdt-buy-btn');
        const sellBtn = document.getElementById('usdt-sell-btn');
        const addrEl = document.getElementById('usdt-pay-addr');

        if (type === 'buy') {
            buyBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white dark:bg-zinc-900 text-emerald-700 shadow";
            sellBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg text-gray-500";
            if (addrEl) addrEl.innerText = state.adminDepositWallet;
        } else {
            sellBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white dark:bg-zinc-900 text-amber-600 shadow";
            buyBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg text-gray-500";
            if (addrEl) addrEl.innerText = state.adminUSDTWallet;
        }
        calculateUSDTTotal();
    }

    function calculateUSDTTotal() {
        const usdt = parseFloat(document.getElementById('usdt-amount').value) || 0;
        const type = document.getElementById('usdt-trade-type').value;
        const rate = type === 'buy' ? state.usdtRates.buyRate : state.usdtRates.sellRate;
        const totalBDT = usdt * rate;
        document.getElementById('usdt-total-bdt').innerText = `৳ ${totalBDT.toFixed(2)}`;
    }

    function processUSDTTrade() {
        const usdt = parseFloat(document.getElementById('usdt-amount').value);
        const type = document.getElementById('usdt-trade-type').value;
        const trxId = document.getElementById('usdt-trx-id').value.trim();
        const rate = type === 'buy' ? state.usdtRates.buyRate : state.usdtRates.sellRate;
        const totalBDT = usdt * rate;

        if (isNaN(usdt) || usdt <= 0 || !trxId) return alert("সঠিক USDT পরিমাণ ও TrxID দিন।");

        state.pendingRequests.unshift({
            id: "REQ_" + Date.now().toString().slice(-5),
            userId: state.userProfile.id,
            userName: state.userProfile.name,
            type: type === 'buy' ? 'USDT Buy' : 'USDT Sell',
            amountBDT: totalBDT,
            usdtAmount: usdt,
            trxId: trxId,
            status: 'Pending',
            timestamp: new Date().toISOString().replace('T', ' ').slice(0, 16)
        });

        saveMasterState();
        closeModal();
        alert("ট্রেড রিকোয়েস্ট সফলভাবে জমা হয়েছে!");
        renderDashboard();
    }

    function p2pCalculateFromUSDT(rate, maxUSD) {
        const usdtInput = document.getElementById('p2p-calc-usdt');
        const bdtInput = document.getElementById('p2p-calc-bdt');
        let usdt = parseFloat(usdtInput.value) || 0;
        if (usdt > maxUSD) {
            usdt = maxUSD;
            usdtInput.value = usdt;
        }
        bdtInput.value = (usdt * rate).toFixed(2);
    }

    function p2pCalculateFromBDT(rate, maxUSD) {
        const usdtInput = document.getElementById('p2p-calc-usdt');
        const bdtInput = document.getElementById('p2p-calc-bdt');
        let bdt = parseFloat(bdtInput.value) || 0;
        let usdt = bdt / rate;
        if (usdt > maxUSD) {
            usdt = maxUSD;
            bdt = usdt * rate;
            bdtInput.value = bdt.toFixed(2);
        }
        usdtInput.value = usdt.toFixed(2);
    }

        const trade = state.p2pTrades.find(t => t.id === tradeId);
        if (trade) {

            trade.lastSenderId = state.userProfile.id;

            });
            saveMasterState();
            openP2PChatRoom(tradeId);
        }
    }

    function releaseP2PUSDTAutomatically(tradeId) {
        const trade = state.p2pTrades.find(t => t.id === tradeId);
        if (!trade) return;

        if (!confirm(`আপনি কি নিশ্চিত যে বিকাশ/নগদে ৳${trade.amountBDT.toFixed(2)} টাকা সঠিকভাবে পেয়েছেন? পেয়ে থাকলে OK চাপুন।`)) return;

        const seller = state.allUsers.find(u => u.id === trade.sellerId);
        const buyer = state.allUsers.find(u => u.id === trade.buyerId);

        if (seller && buyer) {
            if (seller.usdtBalance >= trade.amountUSD) {
                seller.usdtBalance -= trade.amountUSD;
            }
            buyer.usdtBalance += trade.amountUSD;

            if (state.userProfile.id === seller.id) state.userProfile.usdtBalance = seller.usdtBalance;
            if (state.userProfile.id === buyer.id) state.userProfile.usdtBalance = buyer.usdtBalance;

            trade.status = 'Completed';
            trade.isSeen = false;
            trade.lastSenderId = state.userProfile.id;
            trade.messages.push({
                sender: "System",
                text: `✓ সেলার পেমেন্ট নিশ্চিত করেছেন! সিস্টেম অটোমেটিক সেলারের একাউন্ট থেকে $${trade.amountUSD} USDT বায়ারের একাউন্টে পাঠিয়া দিয়েছে।`,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });

            saveMasterState();
            openP2PChatRoom(tradeId);
            alert(`সফল হয়েছে! $${trade.amountUSD} USDT বায়ারের একাউন্টে অটোমেটিক ট্রান্সফার করা হয়েছে।`);
        }
    }

    function sendP2PMessage(tradeId) {
        const input = document.getElementById('p2p-chat-input');
        const txt = input ? input.value.trim() : '';
        if (!txt) return;

        const trade = state.p2pTrades.find(t => t.id === tradeId);
        if (trade) {
            trade.isSeen = false;
            trade.lastSenderId = state.userProfile.id;
            trade.messages.push({
                sender: state.userProfile.name,
                text: txt,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            saveMasterState();
            openP2PChatRoom(tradeId);
        }
    }

        const pkgs = state.gamePackages[state.selectedGame] || [];
        const pkg = pkgs.find(p => p.id === state.selectedGamePkg);

        state.userProfile.balance -= pkg.price;
        state.transactions.unshift({
            id: "TXN_" + Date.now().toString().slice(-4),
            title: `Game TopUp (${pkg.name})`,
            amount: pkg.price,
            type: "Gaming",

        saveMasterState();
        closeModal();
        alert(`টপ-আপ অর্ডার সফল হয়েছে! Player UID: ${uid}`);
        renderDashboard();
    }

                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">টাকার পরিমাণ (BDT)</label>
                    <input type="number" id="recharge-amount" placeholder="৳ 50" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3.5 px-4 rounded-xl text-sm font-bold">
                    <div class="flex gap-1.5 mt-2">
                        ${[20, 50, 100, 200, 500, 1000].map(amt => `
                            <button onclick="document.getElementById('recharge-amount').value=${amt}" class="flex-1 bg-gray-100 dark:bg-zinc-800 py-1.5 rounded-lg text-[11px] font-bold text-emerald-600">৳${amt}</button>
                        `).join('')}
                    </div>
                </div>

                <button onclick="processMobileRecharge()" class="w-full bg-emerald-700 text-white font-extrabold py-4 rounded-xl text-xs uppercase shadow hover:bg-emerald-600 transition">
                    রিচার্জ করুন
                </button>
            </div>
        `);
    }

    function selectOperator(opId) {
        state.selectedOperator = opId;
        document.querySelectorAll('[id^="op-"]').forEach(el => el.classList.remove('selected'));
        const target = document.getElementById('op-' + opId);
        if (target) target.classList.add('selected');
    }

    function processMobileRecharge() {
        const phone = document.getElementById('recharge-phone').value.trim();
        const amt = parseFloat(document.getElementById('recharge-amount').value);

        if (!phone || isNaN(amt) || amt < 10) return alert("সঠিক মোবাইল নম্বর ও নূন্যতম ৳১০ টাকা লিখুন।");
        if (amt > state.userProfile.balance) return alert("আপনার ওয়ালেটে পর্যাপ্ত ব্যালেন্স নেই!");

        state.userProfile.balance -= amt;
        state.transactions.unshift({
            id: "TXN_" + Date.now().toString().slice(-4),
            title: `Mobile Recharge (${phone})`,
            amount: amt,
            type: "Recharge",
            timestamp: new Date().toISOString().replace('T', ' ').slice(0, 16)
        });

        saveMasterState();
        closeModal();
        alert(`৳ ${amt} রিচার্জ সফল হয়েছে!`);
        renderDashboard();
    }

    // --- DEPOSIT SYSTEM ---
    function openAddMoneyModal() {
        if (!checkFeatureFlag('deposit', 'ডিপোজিট')) return;
        showModal("ডিপোজিট করুন", `
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">পেমেন্ট মেথড সিলেক্ট করুন</label>
                    <select id="dep-gateway" onchange="updateGatewayInstructions()" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-xs font-bold">
                        ${state.paymentGateways.map(g => `<option value="${g.id}">${g.name} (${g.number})</option>`).join('')}
                    </select>
                </div>

                <div id="gateway-info-box" class="p-3 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 rounded-xl text-xs space-y-1"></div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">টাকার পরিমাণ (BDT)</label>
                    <input type="number" id="add-amt" placeholder="1000" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-sm font-bold">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">ট্রানজেকশন আইডি (TrxID)</label>
                    <input type="text" id="add-trx" placeholder="যেমন: 9J812390A" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-xs font-bold uppercase">
                </div>

                <button onclick="processAddMoney()" class="w-full bg-emerald-700 text-white font-extrabold py-3.5 rounded-xl text-xs uppercase shadow">ডিপোজিট রিকোয়েস্ট জমা দিন</button>
            </div>`);
        updateGatewayInstructions();
    }

    function updateGatewayInstructions() {
        const gwId = document.getElementById('dep-gateway').value;
        const gw = state.paymentGateways.find(g => g.id === gwId);
        if (gw) {
            document.getElementById('gateway-info-box').innerHTML = `
                <p class="font-bold text-amber-900 dark:text-amber-300">নাম্বার: <span class="text-sm font-black text-emerald-600">${gw.number}</span></p>
                <p class="text-[10px] text-gray-500 dark:text-zinc-400">${gw.instructions}</p>
            `;
        }
    }

    function processAddMoney() {
        const amt = parseFloat(document.getElementById('add-amt').value);
        const trx = document.getElementById('add-trx').value.trim();

        if (isNaN(amt) || amt <= 0 || !trx) return alert("টাকার পরিমাণ ও TrxID সঠিকভাবে প্রদান করুন।");

        state.pendingRequests.unshift({
            id: "REQ_" + Date.now().toString().slice(-4),
            userId: state.userProfile.id,
            userName: state.userProfile.name,
            type: "Deposit",
            amountBDT: amt,
            usdtAmount: 0,
            trxId: trx,
            status: "Pending",
            timestamp: new Date().toISOString().replace('T', ' ').slice(0, 16)
        });

        saveMasterState();
        closeModal();
        alert(`৳ ${amt} ডিপোজিট রিকোয়েস্ট জমা নেওয়া হয়েছে।`);
        renderDashboard();
    }

    function openWithdrawModal() {
        if (!checkFeatureFlag('withdraw', 'উইথড্র')) return;
        showModal("ক্যাশ আউট", `
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">ক্যাশ আউট মেথড</label>
                    <select id="wd-gateway" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-xs font-bold">
                        <option value="bKash">bKash Personal</option>
                        <option value="Nagad">Nagad Personal</option>
                        <option value="Rocket">Rocket Personal</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">একাউন্ট নম্বর</label>
                    <input type="text" id="wd-acc" placeholder="01700000000" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-xs font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">টাকার পরিমাণ (BDT)</label>
                    <input type="number" id="wd-amt" placeholder="500" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-sm font-bold">
                </div>
                <button onclick="processWithdraw()" class="w-full bg-emerald-700 text-white font-extrabold py-3.5 rounded-xl text-xs uppercase">উইথড্র রিকোয়েস্ট পাঠান</button>
            </div>`);
    }

    function processWithdraw() {
        const amt = parseFloat(document.getElementById('wd-amt').value);
        const acc = document.getElementById('wd-acc').value.trim();
        if (isNaN(amt) || amt <= 0 || !acc || state.userProfile.balance < amt) return alert("অপর্যাপ্ত ব্যালেন্স বা ভুল তথ্য।");

        state.pendingRequests.unshift({
            id: "REQ_" + Date.now().toString().slice(-4),
            userId: state.userProfile.id,
            userName: state.userProfile.name,
            type: "Withdraw",
            amountBDT: amt,
            trxId: acc,
            status: "Pending",
            timestamp: new Date().toISOString().replace('T', ' ').slice(0, 16)
        });

        saveMasterState();
        closeModal();
        alert(`৳ ${amt} উইথড্র রিকোয়েস্ট পাঠানো হয়েছে!`);
        renderDashboard();
    }

    // --- SEND MONEY WITH USER ID OR PHONE NUMBER ---
    function openSendMoneyModal() {
        if (!checkFeatureFlag('sendMoney', 'টাকা পাঠান')) return;
        showModal("টাকা পাঠান (Send Money)", `
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">প্রাপকের ইউজার আইডি / মোবাইল নম্বর</label>
                    <input type="text" id="send-target" placeholder="যেমন: USER_123456 অথবা 01700000000" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-xs font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">টাকার পরিমাণ (BDT)</label>
                    <input type="number" id="send-amt" placeholder="500" class="w-full bg-gray-50 dark:bg-zinc-950 border py-3 px-4 rounded-xl text-sm font-bold">
                </div>
                <button onclick="processSendMoney()" class="w-full bg-emerald-700 text-white font-bold py-3.5 rounded-xl text-xs uppercase shadow">
                    ইনস্ট্যান্ট ট্রান্সফার করুন
                </button>
            </div>`);
    }

    function processSendMoney() {
        const target = document.getElementById('send-target').value.trim();
        const amt = parseFloat(document.getElementById('send-amt').value);

        if (!target) return alert("প্রাপকের ইউজার আইডি বা মোবাইল নম্বর দিন!");
        if (isNaN(amt) || amt <= 0) return alert("সঠিক টাকার পরিমাণ দিন!");
        if (amt > state.userProfile.balance) return alert("আপনার ওয়ালেটে পর্যাপ্ত ব্যালেন্স নেই!");

        // Find recipient by User ID, Phone, or Email
        const recipient = state.allUsers.find(u => 
            u.id.toLowerCase() === target.toLowerCase() || 
            (u.phone && u.phone === target) ||
            (u.email && u.email.toLowerCase() === target.toLowerCase())
        );

        if (!recipient) {
            return alert("প্রাপকের অ্যাকাউন্ট বা ইউজার আইডি পাওয়া যায়নি!");
        }

        if (recipient.id === state.userProfile.id) {
            return alert("নিজের একাউন্টে সেন্ড মানি করা সম্ভব নয়!");
        }

        // Deduct from Sender & Credit to Recipient
        state.userProfile.balance -= amt;
        recipient.balance = (recipient.balance || 0) + amt;

        // Record Transaction for Sender
        state.transactions.unshift({ 
            id: "TXN_" + Date.now().toString().slice(-4), 
            title: `টাকা পাঠানো হয়েছে (${recipient.name})`, 
            amount: amt, 
            type: "Send", 
            timestamp: new Date().toISOString().replace('T', ' ').slice(0, 16) 
        });

        saveMasterState();
        closeModal();
        alert(`৳${amt} টাকা সফলভাবে ${recipient.name} (ID: ${recipient.id}) এর কাছে পাঠানো হয়েছে!`);
        renderDashboard();
    }

    function renderServices() {
        document.getElementById('main-content').innerHTML = `
            <h2 class="text-base font-black mb-4">সকল সার্ভিসসমূহ</h2>
            <div class="grid grid-cols-2 gap-3">
                <div onclick="openGamingStoreModal()" class="grid-btn p-4 bg-orange-50 dark:bg-orange-950/20 rounded-2xl flex items-center gap-3">
                    <i class="fa-solid fa-gamepad text-2xl text-orange-500"></i>
                    <div><h4 class="text-xs font-bold">গেম টপ-আপ</h4><span class="text-[10px] text-gray-400">PUBG, FreeFire</span></div>
                </div>
                <div onclick="openMobileRechargeModal()" class="grid-btn p-4 bg-purple-50 dark:bg-purple-950/20 rounded-2xl flex items-center gap-3">
                    <i class="fa-solid fa-mobile-screen text-2xl text-purple-500"></i>
                    <div><h4 class="text-xs font-bold">মোবাইল রিচার্জ</h4><span class="text-[10px] text-gray-400">সকল অপারেটর</span></div>
                </div>
                <div onclick="openDataPackModal()" class="grid-btn p-4 bg-teal-50 dark:bg-teal-950/20 rounded-2xl flex items-center gap-3">
                    <i class="fa-solid fa-wifi text-2xl text-teal-500"></i>
                    <div><h4 class="text-xs font-bold">ডাটা প্যাক</h4><span class="text-[10px] text-gray-400">ইন্টারনেট অফার</span></div>
                </div>
                <div onclick="openUSDTModal()" class="grid-btn p-4 bg-amber-50 dark:bg-amber-950/20 rounded-2xl flex items-center gap-3">
                    <i class="fa-solid fa-right-left text-2xl text-amber-500"></i>
                    <div><h4 class="text-xs font-bold">ট্রেড USDT</h4><span class="text-[10px] text-gray-400">ডলার কেনাবেচা</span></div>
                </div>
            </div>`;
    }

    function renderTransactions() {
        document.getElementById('main-content').innerHTML = `
            <h2 class="text-base font-black mb-4">সকল লেনদেন ইতিহাস</h2>
            <div class="space-y-2">
                ${renderUserTransactionsList(20)}
            </div>`;
    }

    // Modal Utility Helpers
    function showModal(title, bodyHtml) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = bodyHtml;
        document.getElementById('modal-container').classList.remove('hidden');
        window.history.pushState({ modal: true }, "", "#modal");
    }
    function closeModal() { 
        document.getElementById('modal-container').classList.add('hidden'); 
        updateP2PUnreadDot();
    }

    // Init App Instantly
    window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
