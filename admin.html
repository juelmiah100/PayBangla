<!DOCTYPE html>
<html lang="bn" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBangla - Master Admin Panel</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        admin: { light: '#D97706', dark: '#F59E0B' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156,163,175,0.4); border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-zinc-950 text-gray-900 dark:text-zinc-100 min-h-screen transition-colors duration-200 font-sans antialiased flex flex-col justify-center">

<div class="max-w-md mx-auto h-screen w-full bg-white dark:bg-zinc-900 shadow-2xl flex flex-col justify-between relative overflow-hidden border-x border-gray-200 dark:border-zinc-800">

    <!-- Admin Header Bar (Fixed Top) -->
    <header class="flex-shrink-0 bg-amber-700 dark:bg-amber-950 text-white px-4 py-3 flex justify-between items-center z-30 shadow-md">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-user-shield text-2xl text-amber-300"></i>
            <div>
                <h1 class="font-black text-base tracking-wider leading-tight">PayBangla Admin</h1>
                <p class="text-[9px] text-amber-200 font-bold uppercase tracking-widest">Master Cloud Management</p>
            </div>
        </div>
        <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-amber-800 dark:bg-amber-900 hover:bg-amber-600 text-amber-100 text-xs transition">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </button>
    </header>

    <!-- Main Admin Viewport -->
    <main class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4" id="admin-viewport">
        <!-- Dynamic Content -->
    </main>

    <!-- Modal Shell -->
    <div id="admin-modal-container" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end justify-center transition-opacity">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-t-3xl p-6 shadow-2xl max-h-[88vh] overflow-y-auto border-t border-gray-200 dark:border-zinc-800">
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 dark:border-zinc-800 pb-3">
                <h3 id="admin-modal-title" class="text-base font-extrabold text-gray-900 dark:text-zinc-100">Modal Title</h3>
                <button onclick="closeAdminModal()" class="p-1.5 rounded-full text-gray-400 hover:bg-gray-100 dark:hover:bg-zinc-800 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="admin-modal-body" class="space-y-4"></div>
        </div>
    </div>

</div>

<script>
    // --- Firebase Setup ---
    const firebaseConfig = {
        apiKey: "AIzaSyC02ncmc2-7-VULg84bSBT7nMcsoRmBg9Y",
        authDomain: "paybangla-84142.firebaseapp.com",
        databaseURL: "https://paybangla-84142-default-rtdb.firebaseio.com",
        projectId: "paybangla-84142",
        storageBucket: "paybangla-84142.firebasestorage.app",
        messagingSenderId: "856783859136",
        appId: "1:856783859136:web:c795d3c0de4925e1846c25"
    };

    let isFirebaseAvailable = false;
    let db = null;

    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        isFirebaseAvailable = true;
    } catch (e) { console.warn("Local storage mode"); }

    const STORAGE_KEY = 'paybangla_user_db_v15';

    let state = {
        usdtRates: { buyRate: 122.50, sellRate: 120.00 },
        adminDepositWallet: "01700000000 (bKash/Nagad Personal)",
        adminUSDTWallet: "T9xY1zA82kL90pM29qR1S83tU0vW",
        bannerNotice: "🔥 PayBangla ওয়ালেটে স্বাগতম! ইনস্ট্যান্ট P2P ট্রেডিং, ইউএসডিটি বাই-সেল ও গেম টপ-আপ উপভোগ করুন।",
        featureFlags: {
            p2pTrade: true, usdtTrade: true, deposit: true, withdraw: true, gaming: true, recharge: true, dataPack: true, sendMoney: true
        },
        paymentGateways: [],
        gamePackages: { pubg: [], freefire: [] },
        dataPackages: { gp: [], bl: [], robi: [], teletalk: [] },
        p2pAds: [], p2pTrades: [], allUsers: [], pendingRequests: [], transactions: []
    };

    let activeAdminTab = 'pending';

    function loadMasterState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                const parsed = JSON.parse(raw);
                if (parsed.allUsers) state.allUsers = parsed.allUsers;
                if (parsed.pendingRequests) state.pendingRequests = parsed.pendingRequests;
                if (parsed.p2pAds) state.p2pAds = parsed.p2pAds;
                if (parsed.p2pTrades) state.p2pTrades = parsed.p2pTrades;
                if (parsed.paymentGateways) state.paymentGateways = parsed.paymentGateways;
                if (parsed.gamePackages) state.gamePackages = parsed.gamePackages;
                if (parsed.dataPackages) state.dataPackages = parsed.dataPackages;
                if (parsed.usdtRates) state.usdtRates = parsed.usdtRates;
                if (parsed.bannerNotice) state.bannerNotice = parsed.bannerNotice;
                if (parsed.featureFlags) state.featureFlags = { ...state.featureFlags, ...parsed.featureFlags };
            } catch(e) { console.error(e); }
        }
    }

    // SAVE STATE & SYNC TO FIREBASE CLOUD REALTIME
    function saveMasterState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

        if (isFirebaseAvailable && db) {
            // Push System Config to Cloud
            db.collection('system').doc('global_config').set({
                featureFlags: state.featureFlags,
                bannerNotice: state.bannerNotice,
                usdtRates: state.usdtRates,
                paymentGateways: state.paymentGateways,
                gamePackages: state.gamePackages,
                dataPackages: state.dataPackages
            }, { merge: true }).catch(err => console.warn(err));

            // Sync Users List
            state.allUsers.forEach(u => {
                db.collection('users').doc(u.id).set(u, { merge: true }).catch(err => console.warn(err));
            });
        }
    }

    function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

    function initAdminApp() {
        loadMasterState();
        renderAdminDashboard('pending');
    }

    function renderAdminDashboard(tab = 'pending') {
        activeAdminTab = tab;
        loadMasterState();

        const pendingList = state.pendingRequests.filter(r => r.status === 'Pending');
        const viewport = document.getElementById('admin-viewport');

        viewport.innerHTML = `
            <div class="grid grid-cols-4 gap-2 text-center">
                <div class="p-2.5 bg-amber-50 dark:bg-amber-950/30 border rounded-2xl">
                    <span class="text-[9px] font-black text-amber-800 dark:text-amber-300 uppercase block">পেন্ডিং</span>
                    <span class="text-sm font-black text-amber-600">${pendingList.length}</span>
                </div>
                <div class="p-2.5 bg-blue-50 dark:bg-blue-950/30 border rounded-2xl">
                    <span class="text-[9px] font-black text-blue-800 dark:text-blue-300 uppercase block">ইউজার</span>
                    <span class="text-sm font-black text-blue-600">${state.allUsers.length}</span>
                </div>
                <div class="p-2.5 bg-emerald-50 dark:bg-emerald-950/30 border rounded-2xl">
                    <span class="text-[9px] font-black text-emerald-800 dark:text-emerald-300 uppercase block">P2P অ্যাড</span>
                    <span class="text-sm font-black text-emerald-600">${state.p2pAds.length}</span>
                </div>
                <div class="p-2.5 bg-purple-50 dark:bg-purple-950/30 border rounded-2xl">
                    <span class="text-[9px] font-black text-purple-800 dark:text-purple-300 uppercase block">P2P চ্যাট</span>
                    <span class="text-sm font-black text-purple-600">${state.p2pTrades.length}</span>
                </div>
            </div>

            <div class="flex gap-1.5 border-b pb-2 overflow-x-auto custom-scrollbar">
                <button onclick="renderAdminDashboard('pending')" class="px-3 py-1.5 rounded-xl text-xs font-bold ${tab === 'pending' ? 'bg-amber-600 text-white shadow' : 'bg-gray-100 dark:bg-zinc-800 text-gray-500'} whitespace-nowrap">পেন্ডিং (${pendingList.length})</button>
                <button onclick="renderAdminDashboard('users')" class="px-3 py-1.5 rounded-xl text-xs font-bold ${tab === 'users' ? 'bg-amber-600 text-white shadow' : 'bg-gray-100 dark:bg-zinc-800 text-gray-500'} whitespace-nowrap">ইউজার লিস্ট</button>
                <button onclick="renderAdminDashboard('p2p')" class="px-3 py-1.5 rounded-xl text-xs font-bold ${tab === 'p2p' ? 'bg-amber-600 text-white shadow' : 'bg-gray-100 dark:bg-zinc-800 text-gray-500'} whitespace-nowrap">P2P চ্যাট</button>
                <button onclick="renderAdminDashboard('settings')" class="px-3 py-1.5 rounded-xl text-xs font-bold ${tab === 'settings' ? 'bg-amber-600 text-white shadow' : 'bg-gray-100 dark:bg-zinc-800 text-gray-500'} whitespace-nowrap">বাটন অন/অফ &amp; ব্যানার</button>
            </div>

            <div class="space-y-3">
                ${getAdminTabHTML(tab, pendingList)}
            </div>
        `;
    }

    function getAdminTabHTML(tab, pendingList) {
        if (tab === 'pending') {
            return `
                ${pendingList.length === 0 ? `<p class="text-xs text-center text-gray-400 py-8">কোনো পেন্ডিং অর্ডার নেই।</p>` : pendingList.map(req => `
                    <div class="p-3.5 bg-gray-50 dark:bg-zinc-900 rounded-2xl border space-y-2 text-xs">
                        <div class="flex justify-between items-center font-bold">
                            <span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full text-[10px]">${req.type}</span>
                            <span class="text-gray-400 font-mono text-[10px]">${req.timestamp}</span>
                        </div>
                        <p class="font-bold">ইউজার: ${req.userName} (ID: ${req.userId})</p>
                        <p class="text-emerald-600 font-black">পরিমাণ: ৳${req.amountBDT}</p>
                        <p class="text-gray-500 font-mono">TrxID / Phone: <span class="text-blue-600 font-bold">${req.trxId}</span></p>
                        <div class="flex gap-2 pt-1">
                            <button onclick="approveRequest('${req.id}')" class="flex-1 bg-emerald-600 text-white font-black py-2 rounded-xl text-xs shadow">✓ এপ্রুভ করুন</button>
                            <button onclick="rejectRequest('${req.id}')" class="flex-1 bg-red-600 text-white font-black py-2 rounded-xl text-xs shadow">✕ বাতিল করুন</button>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        else if (tab === 'users') {
            return `
                <div class="space-y-2">
                    ${state.allUsers.map(u => `
                        <div class="p-3.5 bg-gray-50 dark:bg-zinc-900 rounded-2xl border space-y-2 text-xs">
                            <div class="flex justify-between items-center">
                                <span class="font-black text-gray-900 dark:text-white">${u.name} (ID: ${u.id})</span>
                                <span class="text-[9px] px-1.5 py-0.2 rounded ${u.isBlocked ? 'bg-red-500 text-white' : 'bg-emerald-100 text-emerald-800'} font-bold">${u.isBlocked ? 'BLOCKED' : 'ACTIVE'}</span>
                            </div>
                            <p class="text-emerald-600 font-black text-[11px]">BDT: ৳${(u.balance || 0).toFixed(2)} | USDT: $${(u.usdtBalance || 0).toFixed(2)}</p>
                            <div class="flex gap-1.5">
                                <button onclick="openEditUserModal('${u.id}')" class="flex-1 bg-blue-600 text-white py-1.5 rounded-lg font-bold text-[10px]">ব্যালেন্স এডিট</button>
                                <button onclick="toggleBlockUser('${u.id}')" class="px-3 ${u.isBlocked ? 'bg-emerald-600' : 'bg-amber-600'} text-white py-1.5 rounded-lg font-bold text-[10px]">${u.isBlocked ? 'Unblock' : 'Block'}</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        else if (tab === 'settings') {
            const flags = state.featureFlags || {};
            return `
                <div class="space-y-4 text-xs">
                    <div class="p-3.5 bg-gray-50 dark:bg-zinc-900 rounded-2xl border space-y-2">
                        <h3 class="font-black text-gray-900 dark:text-white uppercase">হোম পেজ ব্যানার নোটিশ</h3>
                        <textarea id="adm-banner-input" rows="2" class="w-full bg-white dark:bg-zinc-950 border p-2 rounded-xl font-bold">${state.bannerNotice || ''}</textarea>
                        <button onclick="saveBannerNotice()" class="w-full bg-emerald-700 text-white font-bold py-2 rounded-xl shadow">নোটিশ আপডেট করুন</button>
                    </div>

                    <div class="p-3.5 bg-gray-50 dark:bg-zinc-900 rounded-2xl border space-y-3">
                        <h3 class="font-black text-gray-900 dark:text-white uppercase">ইউজার বাটন অন/অফ (Enable / Disable)</h3>
                        <div class="grid grid-cols-2 gap-2 font-bold">
                            <label class="flex items-center justify-between p-2.5 rounded-xl border bg-white dark:bg-zinc-950 cursor-pointer">
                                <span>P2P ট্রেড</span>
                                <input type="checkbox" id="flag-p2pTrade" ${flags.p2pTrade !== false ? 'checked' : ''} class="w-4 h-4 accent-emerald-600">
                            </label>
                            <label class="flex items-center justify-between p-2.5 rounded-xl border bg-white dark:bg-zinc-950 cursor-pointer">
                                <span>USDT ট্রেড</span>
                                <input type="checkbox" id="flag-usdtTrade" ${flags.usdtTrade !== false ? 'checked' : ''} class="w-4 h-4 accent-emerald-600">
                            </label>
                            <label class="flex items-center justify-between p-2.5 rounded-xl border bg-white dark:bg-zinc-950 cursor-pointer">
                                <span>ডিপোজিট</span>
                                <input type="checkbox" id="flag-deposit" ${flags.deposit !== false ? 'checked' : ''} class="w-4 h-4 accent-emerald-600">
                            </label>
                            <label class="flex items-center justify-between p-2.5 rounded-xl border bg-white dark:bg-zinc-950 cursor-pointer">
                                <span>উইথড্র</span>
                                <input type="checkbox" id="flag-withdraw" ${flags.withdraw !== false ? 'checked' : ''} class="w-4 h-4 accent-emerald-600">
                            </label>
                            <label class="flex items-center justify-between p-2.5 rounded-xl border bg-white dark:bg-zinc-950 cursor-pointer">
                                <span>গেম টপ-আপ</span>
                                <input type="checkbox" id="flag-gaming" ${flags.gaming !== false ? 'checked' : ''} class="w-4 h-4 accent-emerald-600">
                            </label>
                            <label class="flex items-center justify-between p-2.5 rounded-xl border bg-white dark:bg-zinc-950 cursor-pointer">
                                <span>মোবাইল রিচার্জ</span>
                                <input type="checkbox" id="flag-recharge" ${flags.recharge !== false ? 'checked' : ''} class="w-4 h-4 accent-emerald-600">
                            </label>
                            <label class="flex items-center justify-between p-2.5 rounded-xl border bg-white dark:bg-zinc-950 cursor-pointer">
                                <span>ডাটা প্যাক</span>
                                <input type="checkbox" id="flag-dataPack" ${flags.dataPack !== false ? 'checked' : ''} class="w-4 h-4 accent-emerald-600">
                            </label>
                            <label class="flex items-center justify-between p-2.5 rounded-xl border bg-white dark:bg-zinc-950 cursor-pointer">
                                <span>টাকা পাঠান</span>
                                <input type="checkbox" id="flag-sendMoney" ${flags.sendMoney !== false ? 'checked' : ''} class="w-4 h-4 accent-emerald-600">
                            </label>
                        </div>
                        <button onclick="saveFeatureFlags()" class="w-full bg-emerald-700 text-white font-black py-3 rounded-xl uppercase text-xs shadow-lg">
                            <i class="fa-solid fa-floppy-disk mr-1"></i> অন/অফ সেটিং ক্লাউডে সেভ করুন
                        </button>
                    </div>
                </div>
            `;
        }
    }

    function saveFeatureFlags() {
        if (!state.featureFlags) state.featureFlags = {};
        state.featureFlags.p2pTrade = document.getElementById('flag-p2pTrade').checked;
        state.featureFlags.usdtTrade = document.getElementById('flag-usdtTrade').checked;
        state.featureFlags.deposit = document.getElementById('flag-deposit').checked;
        state.featureFlags.withdraw = document.getElementById('flag-withdraw').checked;
        state.featureFlags.gaming = document.getElementById('flag-gaming').checked;
        state.featureFlags.recharge = document.getElementById('flag-recharge').checked;
        state.featureFlags.dataPack = document.getElementById('flag-dataPack').checked;
        state.featureFlags.sendMoney = document.getElementById('flag-sendMoney').checked;

        saveMasterState();
        alert("বাটন কনফিগারেশন ফায়ারবেস ক্লাউডে সেভ হয়েছে! অ্যান্ড্রয়েড অ্যাপের ভেতরে 'কামিং সুন' আপডেট হয়ে গেছে।");
        renderAdminDashboard('settings');
    }

    function saveBannerNotice() {
        state.bannerNotice = document.getElementById('adm-banner-input').value.trim();
        saveMasterState();
        alert("ব্যানার নোটিশ লাইভ আপডেট হয়েছে!");
    }

    function approveRequest(reqId) {
        const req = state.pendingRequests.find(r => r.id === reqId);
        if (!req) return;
        const targetUser = state.allUsers.find(u => u.id === req.userId);
        if (targetUser) {
            if (req.type === 'Deposit') targetUser.balance = (targetUser.balance || 0) + req.amountBDT;
            else if (req.type === 'Withdraw') targetUser.balance = (targetUser.balance || 0) - req.amountBDT;
            else if (req.type === 'USDT Buy') targetUser.usdtBalance = (targetUser.usdtBalance || 0) + (req.usdtAmount || 0);
            else if (req.type === 'USDT Sell') targetUser.balance = (targetUser.balance || 0) + req.amountBDT;

            req.status = 'Approved';
            saveMasterState();
            alert(`রিকোয়েস্ট এপ্রুভ হয়েছে এবং ইউজার ওয়ালেটে টাকা জমার মেসেজ সিঙ্ক হয়েছে!`);
            renderAdminDashboard('pending');
        }
    }

    function rejectRequest(reqId) {
        const req = state.pendingRequests.find(r => r.id === reqId);
        if (req) {
            req.status = 'Rejected';
            saveMasterState();
            alert("রিকোয়েস্ট বাতিল করা হয়েছে!");
            renderAdminDashboard('pending');
        }
    }

    function openEditUserModal(userId) {
        const u = state.allUsers.find(user => user.id === userId);
        if (!u) return;

        showAdminModal(`ব্যালেন্স এডিট - ${u.name}`, `
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">মেইন ব্যালেন্স (BDT)</label>
                    <input type="number" id="edit-user-bdt" value="${u.balance || 0}" class="w-full bg-gray-50 dark:bg-zinc-950 border p-3 rounded-xl text-xs font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">USDT ব্যালেন্স ($)</label>
                    <input type="number" id="edit-user-usdt" value="${u.usdtBalance || 0}" class="w-full bg-gray-50 dark:bg-zinc-950 border p-3 rounded-xl text-xs font-bold">
                </div>
                <button onclick="saveUserBalance('${u.id}')" class="w-full bg-emerald-700 text-white font-extrabold py-3 rounded-xl text-xs uppercase shadow">সেভ করুন</button>
            </div>
        `);
    }

    function saveUserBalance(userId) {
        const u = state.allUsers.find(user => user.id === userId);
        if (u) {
            u.balance = parseFloat(document.getElementById('edit-user-bdt').value) || 0;
            u.usdtBalance = parseFloat(document.getElementById('edit-user-usdt').value) || 0;
            saveMasterState();
            closeAdminModal();
            alert("ইউজার ওয়ালেট ব্যালেন্স লাইভ সেভ হয়েছে!");
            renderAdminDashboard('users');
        }
    }

    function toggleBlockUser(userId) {
        const u = state.allUsers.find(user => user.id === userId);
        if (u) {
            u.isBlocked = !u.isBlocked;
            saveMasterState();
            alert(`ইউজারকে ${u.isBlocked ? 'ব্লক' : 'আনব্লক'} করা হয়েছে!`);
            renderAdminDashboard('users');
        }
    }

    function showAdminModal(title, bodyHtml) {
        document.getElementById('admin-modal-title').innerText = title;
        document.getElementById('admin-modal-body').innerHTML = bodyHtml;
        document.getElementById('admin-modal-container').classList.remove('hidden');
    }
    function closeAdminModal() {
        document.getElementById('admin-modal-container').classList.add('hidden');
    }

    window.addEventListener('DOMContentLoaded', initAdminApp);
</script>
</body>
</html>
